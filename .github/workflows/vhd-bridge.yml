# vhd-machine-auth-bridge: feature matrix CI.
#
# Implements task 21.1.  Three flavors covering the deployment forms defined
# by Requirement 1 + design.md "编译特性矩阵":
#
#   | flavor      | runs-on        | features                     | role                   |
#   | ----------- | -------------- | ---------------------------- | ---------------------- |
#   | controller  | ubuntu-24.04   | (default)                    | RustDesk_Controller    |
#   | controlled  | windows-2022   | vhd-bridge,controlled-only   | RustDesk_Controlled    |
#   | relay       | ubuntu-24.04   | (default)                    | RustDesk_RelayServer   |
#
# Each flavor runs `cargo check --lib` and `cargo test --lib` against its
# feature combo, then `cargo build --bin rustdesk` followed by the artifact
# string scanner from task 21.2 (`scripts/check_bridge_strings.ps1`).  Forbidden
# bridge tokens, missing RS_PUB_KEY, secret.sec plaintext leaks, and
# inconsistent RS_PUB_KEY sources all fail the job.
#
# Secrets — HBBS_KEY / HBBS_HOST / HBBR_HOST (Build_Prereq_Vars, all flavors)
# and VHD_BRIDGE_SECRET_HEX / VHD_BRIDGE_SECRET_B64 / VHD_BRIDGE_SECRET_VERSION
# (controlled flavor only) are injected from GitHub Actions repo secrets and
# masked.  The workflow file MUST NOT contain plaintext values for any of
# these six variables, and steps MUST NOT echo / `set -x` / `printenv` them
# (Requirement 14.5 / 14.7).  `secret.sec` and `vhd_bridge_secret.bin` are in
# `.gitignore` and are NEVER materialised on the runner — `build.rs` consumes
# the env vars directly.
name: vhd-bridge

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  LLVM_VERSION: "15.0.6"

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "res/**"
      - "appimage/**"
      - "flatpak/**"

jobs:
  matrix:
    name: ${{ matrix.job.flavor }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - {
              flavor: controller,
              os: ubuntu-24.04,
              target: x86_64-unknown-linux-gnu,
              features: "",
              vcpkg-triplet: "",
            }
          - {
              flavor: controlled,
              os: windows-2022,
              target: x86_64-pc-windows-msvc,
              features: "vhd-bridge,controlled-only",
              vcpkg-triplet: x64-windows-static,
            }
          - {
              flavor: relay,
              os: ubuntu-24.04,
              target: x86_64-unknown-linux-gnu,
              features: "",
              vcpkg-triplet: "",
            }
    env:
      # Build_Prereq_Vars — required by build.rs §1.2b on every flavor (task
      # 22.1-22.4).  Masked GitHub Actions secrets; never echoed.
      HBBS_KEY: ${{ secrets.HBBS_KEY }}
      HBBS_HOST: ${{ secrets.HBBS_HOST }}
      HBBR_HOST: ${{ secrets.HBBR_HOST }}
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install prerequisites (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get -y update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            gcc \
            git \
            g++ \
            libpam0g-dev \
            libasound2-dev \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev \
            libpulse-dev \
            libva-dev \
            libvdpau-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxdo-dev \
            libxfixes-dev \
            nasm \
            wget

      - name: Install LLVM and Clang (Windows)
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Setup vcpkg with Github Actions binary cache (Linux)
        if: runner.os == 'Linux'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Setup vcpkg with Github Actions binary cache (Windows)
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          $VCPKG_ROOT/vcpkg install --x-install-root="$VCPKG_ROOT/installed"

      - name: Install vcpkg dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          $VCPKG_ROOT/vcpkg install \
            --triplet ${{ matrix.job.vcpkg-triplet }} \
            --x-install-root="$VCPKG_ROOT/installed"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.job.target }}
          components: ""

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: vhd-bridge-${{ matrix.job.flavor }}

      - name: Show toolchain
        shell: bash
        run: |
          rustup -V
          rustc -V
          cargo -V

      # vhd-bridge controlled flavor: inject the 32-byte shared secret + its
      # version through env vars only.  build.rs prefers _HEX over _B64 (§3.1),
      # so providing both is harmless — but the workflow MUST NOT set both
      # simultaneously when only one is configured in repo secrets.  Empty
      # secret refs evaluate to empty strings; build.rs treats empty env vars
      # as "unset" via std::env::var(...).ok() returning Some("") which would
      # fail decoding, hence the `if` guard below skips the assignment when
      # the secret is absent.
      - name: Inject vhd-bridge shared secret (controlled flavor only)
        if: matrix.job.flavor == 'controlled'
        shell: bash
        env:
          # Masked secrets — never echoed.  Forwarded into the cargo step's
          # process environment via $GITHUB_ENV so subsequent steps see them
          # without `export` lines that show up in logs.
          IN_HEX: ${{ secrets.VHD_BRIDGE_SECRET_HEX }}
          IN_B64: ${{ secrets.VHD_BRIDGE_SECRET_B64 }}
          IN_VER: ${{ secrets.VHD_BRIDGE_SECRET_VERSION }}
        run: |
          # Do NOT print the values.  Only emit presence flags for diagnostics.
          if [ -n "${IN_HEX:-}" ]; then
            echo "VHD_BRIDGE_SECRET_HEX=${IN_HEX}" >> "$GITHUB_ENV"
            echo "secret source: hex"
          elif [ -n "${IN_B64:-}" ]; then
            echo "VHD_BRIDGE_SECRET_B64=${IN_B64}" >> "$GITHUB_ENV"
            echo "secret source: b64"
          else
            echo "::error::VHD_BRIDGE_SECRET_HEX or VHD_BRIDGE_SECRET_B64 must be set as a repo secret for the controlled flavor"
            exit 1
          fi
          if [ -n "${IN_VER:-}" ]; then
            echo "VHD_BRIDGE_SECRET_VERSION=${IN_VER}" >> "$GITHUB_ENV"
          fi

      - name: cargo check --lib
        shell: bash
        run: |
          if [ -n "${{ matrix.job.features }}" ]; then
            cargo check --locked --lib --target=${{ matrix.job.target }} --features "${{ matrix.job.features }}"
          else
            cargo check --locked --lib --target=${{ matrix.job.target }}
          fi

      - name: cargo test --lib
        shell: bash
        run: |
          if [ -n "${{ matrix.job.features }}" ]; then
            cargo test --locked --lib --target=${{ matrix.job.target }} --features "${{ matrix.job.features }}"
          else
            cargo test --locked --lib --target=${{ matrix.job.target }}
          fi

      # Task 21.2 — build a real binary so the artifact string scanner has
      # something to scan.  The controller / relay flavors build with
      # default features per design.md §"编译特性矩阵" and Requirement 1.2;
      # the controlled flavor builds with the matrix's vhd-bridge,
      # controlled-only feature combo.
      - name: cargo build --bin rustdesk
        shell: bash
        run: |
          if [ -n "${{ matrix.job.features }}" ]; then
            cargo build --locked --bin rustdesk --target=${{ matrix.job.target }} --features "${{ matrix.job.features }}"
          else
            cargo build --locked --bin rustdesk --target=${{ matrix.job.target }}
          fi

      # Task 21.2 artifact string scanner.  Single pwsh script drives all
      # three flavors on both windows-2022 and ubuntu-24.04 runners (pwsh
      # is preinstalled on ubuntu-24.04).  Exit codes are propagated, so a
      # forbidden-token hit, RS_PUB_KEY mismatch, or secret.sec leak fails
      # the job.
      - name: Artifact string scanner
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts/check_bridge_strings.ps1 `
            -Flavor ${{ matrix.job.flavor }} `
            -Target ${{ matrix.job.target }}

      # Task 17.7: behavioral smoke for the controlled-only product.
      # Builds a release artifact and asserts (a) initiator subcommands
      # exit non-zero, (b) `--version` exposes
      # `vhd-bridge-secret-version=<n>`, (c) `--server` stays alive
      # past a 3 s hold window.  Skipped on flavors that don't link
      # `controlled-only`.  `-SkipServer` is passed because GitHub
      # `windows-2022` runners run as a non-elevated `runneradmin`
      # account; `--server` reaches privacy_mode registry edits that
      # need real admin and would exit early there even though the
      # entry point is intact.  CI keeps the static-symbol scan in
      # task 21.2 as the binding receiver-path proof; this step is the
      # CLI/URI-refusal proof.
      - name: Behavioral smoke (controlled-only)
        if: matrix.job.flavor == 'controlled'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.job.target }}/debug/rustdesk.exe"
          if (-not (Test-Path $bin)) {
            cargo build --locked --bin rustdesk `
              --target=${{ matrix.job.target }} `
              --features "${{ matrix.job.features }}"
          }
          if (-not (Test-Path $bin)) {
            Write-Error "expected $bin after cargo build"
            exit 1
          }
          pwsh -File scripts/smoke_controlled_only.ps1 -Binary $bin -SkipServer
